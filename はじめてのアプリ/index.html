    /* 白いカード部分 */
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);  /* やわらかい影 */
      padding: 24px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 4px;
      color: #1f2d3d;
    }

    .sub {
      margin: 0 0 20px;
      color: #7a8ba0;
      font-size: 13px;
    }

    /* 入力欄とボタンを横並びにする箱 */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    #newItem {
      flex: 1;                       /* 余った幅いっぱいに広がる */
      padding: 12px;
      border: 2px solid #dce4ec;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    #newItem:focus { border-color: #ef4444; }  /* クリック中は青枠 */

    .add-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    .add-btn:hover { background: #e0447f; }

    /* リスト下の帯（残り件数と「完了を消す」ボタン）*/
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }
    .count { color: #7a8ba0; font-size: 13px; }
    .clear-btn {
      border: none;
      background: #eef7f0;
      color: #5a6b7d;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .clear-btn:hover { background: #e2e8f0; }

    /* 表示切り替えボタン（すべて / 未完了 / 完了）*/
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .filter-btn {
      border: none;

      color: #5a6b7d;
      padding: 6px 14px;
      border-radius: 20px;

      cursor: pointer;
    }
    .filter-btn.active {

      list-style: none;              /* 「・」の点を消す */

<body>
  <!-- ====== ここから HTML（中身・骨組み）====== -->
  <div class="card">
    <h1>📝 あなたの会社分析リスト</h1>
    <p class="sub">やることを書いて「追加」を押してみましょう</p>

    <div class="input-row">
      <!-- 文字を打ち込む欄 -->
      <input id="newItem" type="text" placeholder="例：牛乳を買う">
      <!-- 追加ボタン。押すと下の addItem() が動く -->
      <button class="add-btn" onclick="addItem()">追加</button>
    </div>

    <!-- 表示の切り替えボタン -->
    <div class="filters">
      <button class="filter-btn" id="f-all" onclick="setFilter('all')">すべて</button>
      <button class="filter-btn" id="f-active" onclick="setFilter('active')">未完了</button>
      <button class="filter-btn" id="f-done" onclick="setFilter('done')">完了</button>
    </div>

    <!-- ここに項目が並んでいく（最初はからっぽ） -->
    <ul id="list"></ul>

    <!-- リストの下：残り件数と「完了を消す」ボタン -->
    <div class="footer">
      <span id="count" class="count">残り 0 件</span>
      <button class="clear-btn" onclick="clearDone()">完了を消す</button>
    </div>

    <!-- 写真を選ぶための部品（画面には出さず、📷ボタンから呼び出す）-->
    <input type="file" id="imgInput" accept="image/*" style="display:none">
  </div>

  <!-- ====== ここから JavaScript（うごき）====== -->
  <script>
    // やることを覚えておく箱（配列）。1つ1つは { text: 文字, done: 完了かどうか }
    let todos = [];

    // 今どの表示にするか（"all"=すべて / "active"=未完了 / "done"=完了）
    let filter = "all";

    // 📷 今どの項目に写真をつけようとしているか、を覚えておく箱
    let pendingImageIndex = null;

    // ▼ ブラウザに保存しておいて、次に開いても消えないようにする
    function save() {
      localStorage.setItem("myTodos", JSON.stringify(todos));
    }

    // ▼ 保存してあったデータを読み込む
    function load() {
      const saved = localStorage.getItem("myTodos");
      if (saved) todos = JSON.parse(saved);
    }

    // ▼ 画面に今のリストを描き直す
    function render() {
      const list = document.getElementById("list");
      list.innerHTML = ""; // いったん空にする

      // 重要マーク（⭐）がついた項目を、上のほうに並べ替える
      todos.sort(function (a, b) {
        return (b.important ? 1 : 0) - (a.important ? 1 : 0);
      });

      // 残り（まだ終わっていない）件数を数えて表示する
      const remaining = todos.filter(function (t) { return !t.done; }).length;
      document.getElementById("count").textContent = "残り " + remaining + " 件";

      // 今選ばれている表示ボタンをピンク（active）にする
      document.getElementById("f-all").classList.toggle("active", filter === "all");
      document.getElementById("f-active").classList.toggle("active", filter === "active");
      document.getElementById("f-done").classList.toggle("active", filter === "done");

      if (todos.length === 0) {
        list.innerHTML = '<p class="empty">まだ何もありません</p>';
        return;
      }

      // todos の中身を1つずつ取り出して行を作る
      todos.forEach(function (todo, index) {
        // 表示切り替え：選んだ条件に合わないものはとばす
        if (filter === "active" && todo.done) return;   // 未完了だけ表示中 → 完了はとばす
        if (filter === "done" && !todo.done) return;    // 完了だけ表示中 → 未完了はとばす

        const li = document.createElement("li");
        if (todo.done) li.classList.add("done");
        if (todo.important) li.classList.add("important");

        li.innerHTML =
          '<input type="checkbox" ' + (todo.done ? "checked" : "") +
          ' onclick="toggle(' + index + ')">' +
          '<button class="star-btn" onclick="toggleStar(' + index + ')">' +
          (todo.important ? "⭐" : "☆") + '</button>' +
          (todo.image ? '<img class="thumb" src="' + todo.image + '">' : '') +
          '<span class="text"></span>' +
          '<button class="img-btn" onclick="attachImage(' + index + ')">📷</button>' +
          '<button class="edit-btn" onclick="editItem(' + index + ')">✏️</button>' +
          '<button class="del-btn" onclick="remove(' + index + ')">🗑</button>';

        // 文字はあえて textContent で入れる（打ち込んだ文字を安全に表示するため）
        li.querySelector(".text").textContent = todo.text;
        list.appendChild(li);
      });

      // 絞り込んだ結果、表示するものが1つもなかったとき
      if (list.children.length === 0) {
        list.innerHTML = '<p class="empty">表示するものがありません</p>';
      }
    }

    // ▼ 表示の切り替え（すべて / 未完了 / 完了）
    function setFilter(name) {
      filter = name;
      render();
    }

    // ▼ 📷 ボタン：どの項目に写真をつけるか覚えて、ファイル選択を開く
    function attachImage(index) {
      pendingImageIndex = index;
      document.getElementById("imgInput").click();
    }

    // ▼ 写真が選ばれたときの動き（小さく縮小してから保存する）
    document.getElementById("imgInput").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file || pendingImageIndex === null) return;

      const reader = new FileReader();
      reader.onload = function (ev) {
        const img = new Image();
        img.onload = function () {
          // 横幅を最大400pxまで縮小する（容量を小さく保つため）
          const maxW = 400;
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement("canvas");
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);

          // 縮小した画像を、その項目に保存
          todos[pendingImageIndex].image = canvas.toDataURL("image/jpeg", 0.7);
          pendingImageIndex = null;
          e.target.value = ""; // 同じ写真をもう一度選べるようにリセット
          save();
          render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // ▼ 「追加」ボタンを押したときの動き
    function addItem() {
      const input = document.getElementById("newItem");
      const text = input.value.trim(); // 前後の空白を消す
      if (text === "") return;         // 空っぽなら何もしない

      todos.push({ text: text, done: false, important: false }); // 箱に追加
      input.value = "";                          // 入力欄を空に戻す
      save();
      render();
    }

    // ▼ チェックのON/OFFを切り替える
    function toggle(index) {
      todos[index].done = !todos[index].done;
      save();
      render();
    }

    // ▼ ⭐ ボタン：重要マークのオン/オフを切り替える
    function toggleStar(index) {
      todos[index].important = !todos[index].important;
      save();
      render();
    }

    // ▼ ✏️ ボタン：項目の文字をあとから書き直す
    function editItem(index) {
      // 小さな入力窓を出す。今の文字を最初から入れておく
      const newText = prompt("新しい内容を入力してください", todos[index].text);
      if (newText === null) return;   // 「キャンセル」を押したら何もしない
      const trimmed = newText.trim();
      if (trimmed === "") return;      // 空っぽのときは変更しない
      todos[index].text = trimmed;     // 中身を書き換える
      save();
      render();
    }

    // ▼ ゴミ箱ボタンで削除する
    function remove(index) {
      todos.splice(index, 1); // index番目を1個消す
      save();
      render();
    }

    // ▼ 「完了を消す」ボタン：チェック済みのものだけまとめて消す
    function clearDone() {
      todos = todos.filter(function (t) { return !t.done; });
      save();
      render();
    }

    // ▼ Enterキーでも追加できるようにする
    document.getElementById("newItem").addEventListener("keydown", function (e) {
      if (e.key === "Enter") addItem();
    });

    // ▼ ページを開いたとき：保存データを読んで表示
    load();
    render();
  </script>
</body>
